<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkedin</title>
    <link rel="stylesheet" href="dashboardStyle.css">
</head>

<body>
    <div id="header">
        <div id="navBar">
            <div class="logo_searchbar">
                <a href="#" id="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" data-supported-dps="24x24"
                        fill="currentColor" class="mercado-match" width="41" height="41" focusable="false">
                        <path
                            d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19a.66.66 0 000 .14V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z">
                        </path>
                    </svg>
                </a>

                <div class="searchBox">
                    <span class="searchIcon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" id="search-small" aria-hidden="true"
                            role="none" data-supported-dps="16x16" fill="currentColor" width="16px">
                            <path
                                d="M14.56 12.44L11.3 9.18a5.51 5.51 0 10-2.12 2.12l3.26 3.26a1.5 1.5 0 102.12-2.12zM3 6.5A3.5 3.5 0 116.5 10 3.5 3.5 0 013 6.5z">
                            </path>
                        </svg>
                    </span>
                    <input type="text" placeholder="Search" class="searchInput">
                </div>
            </div>

            <nav>
                <ul>
                    <li>
                        <a href="" class="activeTab">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" data-supported-dps="24x24"
                                fill="currentColor" class="mercado-match" width="24" height="24" focusable="false">
                                <path
                                    d="M23 9v2h-2v7a3 3 0 01-3 3h-4v-6h-4v6H6a3 3 0 01-3-3v-7H1V9l11-7 5 3.18V2h3v5.09z">
                                </path>
                            </svg>
                            <span>Home</span>
                        </a>
                    </li>

                    <li>
                        <a href="">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="20" fill="none" focusable="false"
                                aria-busy="false">
                                <path
                                    d="M9 14v6H0v-6c0-1.7 1.3-3 3-3h3c1.7 0 3 1.3 3 3Zm5.5-3c1.9 0 3.5-1.6 3.5-3.5S16.4 4 14.5 4 11 5.6 11 7.5s1.6 3.5 3.5 3.5Zm1 2h-2c-1.4 0-2.5 1.1-2.5 2.5V20h7v-4.5c0-1.4-1.1-2.5-2.5-2.5ZM4.5 0C2 0 0 2 0 4.5S2 9 4.5 9 9 7 9 4.5 7 0 4.5 0Z"
                                    fill="currentColor"></path>
                            </svg>
                            <span>My Network</span>
                        </a>
                    </li>

                    <li>
                        <a href="">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="18" fill="none" focusable="false"
                                aria-busy="false">
                                <path
                                    d="M15 4V3c0-1.7-1.3-3-3-3H8C6.3 0 5 1.3 5 3v1H0v4c0 1.7 1.3 3 3 3h14c1.7 0 3-1.3 3-3V4h-5ZM7 3c0-.6.4-1 1-1h4c.6 0 1 .4 1 1v1H7V3Zm10 9c1.2 0 2.3-.5 3-1.4V15c0 1.7-1.3 3-3 3H3c-1.7 0-3-1.3-3-3v-4.4c.7.9 1.8 1.4 3 1.4h14Z"
                                    fill="currentColor"></path>
                            </svg>
                            <span>Jobs</span>
                        </a>
                    </li>

                    <li>
                        <a href="">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" data-supported-dps="24x24"
                                fill="currentColor" class="mercado-match" width="24" height="24" focusable="false">
                                <path
                                    d="M16 4H8a7 7 0 000 14h4v4l8.16-5.39A6.78 6.78 0 0023 11a7 7 0 00-7-7zm-8 8.25A1.25 1.25 0 119.25 11 1.25 1.25 0 018 12.25zm4 0A1.25 1.25 0 1113.25 11 1.25 1.25 0 0112 12.25zm4 0A1.25 1.25 0 1117.25 11 1.25 1.25 0 0116 12.25z">
                                </path>
                            </svg>
                            <span>Messaging</span>
                        </a>
                    </li>

                    <li>
                        <a href="">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" data-supported-dps="24x24"
                                fill="currentColor" class="mercado-match" width="24" height="24" focusable="false">
                                <path
                                    d="M22 19h-8.28a2 2 0 11-3.44 0H2v-1a4.52 4.52 0 011.17-2.83l1-1.17h15.7l1 1.17A4.42 4.42 0 0122 18zM18.21 7.44A6.27 6.27 0 0012 2a6.27 6.27 0 00-6.21 5.44L5 13h14z">
                                </path>
                            </svg>
                            <span>Notifications</span>
                        </a>
                    </li>

                    <li>
                        <a href="" class="userTab">
                            <img src="/Assets/umairProfile.jpg" alt="user profile" width="24px">
                            <span>
                                Me
                                <svg role="none" aria-hidden="true" class="global-nav__icon global-nav__icon--small"
                                    xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"
                                    data-supported-dps="16x16" data-test-icon="caret-small">
                                    <path d="M4 6l4 4 4-4" fill="currentColor" stroke="currentColor"
                                        stroke-width="1.5" />
                                </svg>
                            </span>
                        </a>
                    </li>

                    <li>
                        <a href="" class="navBtns">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" data-supported-dps="24x24"
                                fill="currentColor" class="mercado-match" width="24" height="24" focusable="false">
                                <path
                                    d="M3 3h4v4H3zm7 4h4V3h-4zm7-4v4h4V3zM3 14h4v-4H3zm7 0h4v-4h-4zm7 0h4v-4h-4zM3 21h4v-4H3zm7 0h4v-4h-4zm7 0h4v-4h-4z">
                                </path>
                            </svg>
                            <span>
                                For Business
                                <svg role="none" aria-hidden="true" class="global-nav__icon global-nav__icon--small"
                                    xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"
                                    data-supported-dps="16x16" data-test-icon="caret-small">
                                    <path d="M4 6l4 4 4-4" fill="currentColor" stroke="currentColor"
                                        stroke-width="1.5" />
                                </svg>
                            </span>
                        </a>
                    </li>

                    <li>
                        <a href="" class="navBtns">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="premium-chip-v2-medium"
                                aria-hidden="true" role="none" data-supported-dps="24x24">
                                <path
                                    d="M20.01 20.01c.63-.63.99-1.48.99-2.38V6.38C21 4.51 19.49 3 17.62 3H6.38c-.9 0-1.75.36-2.38.99l16.02 16.02z"
                                    fill="#e7a33e"></path>
                                <path
                                    d="M3.99 3.99C3.36 4.62 3 5.48 3 6.38v11.25c0 1.87 1.51 3.38 3.38 3.38h11.25c.9 0 1.75-.36 2.38-.99L3.99 3.99z"
                                    fill="#c37d16"></path>
                            </svg>
                            <span>Try Premium for Rs 0</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <div class="mainLayout">
        <div class="mainContainer">
            <aside class="leftAside"></aside>
            <main></main>
            <aside class="rightAside"></aside>
        </div>
    </div>
</body>

</html>
